global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    cluster: 'production'
    environment: 'prod'

rule_files:
  - "recording-rules.yml"

scrape_configs:
  - job_name: 'loxilb-enterprise'
    scrape_interval: 10s
    scrape_timeout: 5s
    metrics_path: '/netlox/v1/metrics'
    static_configs:
      # LoxiLB Node 1
      - targets:
          - 'llb1-loxilb.io:11111' # Change to your LoxiLB IP
        labels:
          region: 'ap-northeast-2'
          datacenter: 'seoul2'
          cluster: 'prod'
          node_name: 'loxilb-prod-1'
          node_role: 'primary'
      
      # LoxiLB Node 2
      - targets:
          - 'llb2-loxilb.io:11111' # Change to your LoxiLB IP
        labels:
          region: 'ap-northeast-2'
          datacenter: 'seoul2'
          cluster: 'prod'
          node_name: 'loxilb-prod-2'
          node_role: 'secondary'
      
      # Add more nodes as needed
      # - targets:
      #     - 'LOXILB_IP:11111'
      #   labels:
      #     region: 'your-region'
      #     datacenter: 'your-dc'
      #     cluster: 'prod'
      #     node_name: 'loxilb-prod-3'
      #     node_role: 'standby'