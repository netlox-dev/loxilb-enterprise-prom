---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
      evaluation_interval: 10s
      external_labels:
        cluster: 'production'
        environment: 'prod'

    scrape_configs:
      - job_name: 'loxilb-enterprise'
        scrape_interval: 10s
        scrape_timeout: 5s
        metrics_path: '/netlox/v1/metrics'
        static_configs:
          - targets:
              - '54.180.113.121:11111'  # Replace with your LoxiLB Enterprise IP and port
            labels:
              region: 'ap-northeast-2'
              datacenter: 'seoul2'

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
        jsonData:
          timeInterval: "10s"
          queryTimeout: "60s"
          httpMethod: POST

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  namespace: monitoring
data:
  dashboards.yml: |
    apiVersion: 1

    providers:
      - name: 'LoxiLB Dashboards'
        orgId: 1
        folder: 'LoxiLB'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /etc/grafana/provisioning/dashboards
